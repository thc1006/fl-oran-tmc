# Path D full sweep — 3 archs × 3 algos × 6 partitions × 10 seeds = 540 cells.
#
# Closes the §2.6 "FedSCAM + FedMoSWA deferred → done" framing by extending
# from the existing 60-cell LSTM-only SAM-family sweep (5 seeds × {fedscam,
# fedgmt} × 6 partitions) to the full multi-arch × multi-algo matrix.
#
# Cell breakdown:
#   existing (preserved via --skip-completed):
#     60 = 1 arch (lstm) × 2 algos × 6 partitions × 5 seeds {0,1,2,3,42}
#   new (480 cells):
#     30  lstm × {fedscam, fedgmt}      × 6 part × 5 seeds {4,5,6,7,8}  (seed gap fill)
#     60  lstm × fedmoswa                × 6 part × 10 seeds
#     180 mamba × 3 algos                × 6 part × 10 seeds
#     180 spiking_expand2 × 3 algos      × 6 part × 10 seeds
#
# All 540 cells have a matched Phase 5 baseline (FedAvg or FedAdam) at the
# same (arch, partition, seed) — Phase 5 itself runs 10 seeds [0..8, 42].
# Paired-bootstrap CI95 (n_boot=10000) + Wilcoxon n=10 are valid for every
# cell. Max-extreme Wilcoxon p-value at n=10 is 2/2^10 ≈ 0.002.
#
# Hyperparameters pinned to paper defaults (do NOT retune per arch):
#   FedSCAM (Rahil 2026 arXiv:2601.00853, §3 + §4.1.3 mid-of-tested):
#     rho_max=0.05, alpha_rho=1.0, gamma=1.0, beta_align=0.8, kappa=1.0
#   FedGMT (Lee 2025 ICML, harrylee999/FL-SAM README example):
#     alpha_ema=0.95, gamma_kl=1.0, tau=3.0, beta=10.0, n_total_clients=7
#   FedMoSWA (Liu 2025 ICML, arXiv:2507.20016 §6.1):
#     rho=0.1, alpha_la=1.5, gamma=0.2, n_total_clients=7
#
# Wall budget on 4×V100-SXM2-32GB (sharded across 4 chains via --shard):
#   LSTM cell:      ~530 s (eager mode, TORCHDYNAMO_DISABLE=1, bf16 emul.)
#   Mamba cell:     ~1100 s
#   Spiking cell:   ~2700 s
#   Total wall: 180 LSTM + 180 Mamba + 180 Spiking
#             = 180·(530+1100+2700) = 779400 s = 216.5 GPU-hr
#             ÷ 4 GPUs = 54.1 hr wall (≈ 2.3 days)
#   With existing 60 LSTM cells skipped: ~52 hr wall.
#
# Sharding: ``--shard N/M`` filter on run_v7_phase_sweep.py (1-based).
# Cell index modulo 4 distributes Spiking/Mamba/LSTM evenly across chains.
# Skip-completed is read AFTER shard so chain assignment is stable.
#
# Mixed precision: bf16 on both V100 (emulated, ~30% slower than fp16 but
# stable without GradScaler) and 4060 Ti (native sm_89). Switching V100 to
# fp16 would require adding torch.cuda.amp.GradScaler to _local_loop —
# deferred (correctness over speed for paper-grade cells).

description: Path D full SAM-family sweep (3 archs × 3 algos × 6 part × 10 seeds)
adr_reference: ADR-001 D-22 + FUTURE_WORK Direction 5

archs:
  - lstm
  - mamba
  - spiking_expand2

algorithms:
  - name: fedscam
    kwargs:
      rho_max: 0.05
      alpha_rho: 1.0
      gamma: 1.0
      beta_align: 0.8
      kappa: 1.0
  - name: fedgmt
    kwargs:
      alpha_ema: 0.95
      gamma_kl: 1.0
      tau: 3.0
      beta: 10.0
      n_total_clients: 7
  - name: fedmoswa
    kwargs:
      rho: 0.1
      alpha_la: 1.5
      gamma: 0.2
      n_total_clients: 7

partitions:
  - mode: iid
    n_clients: 7
  - mode: dirichlet
    alpha: 0.05
    n_clients: 7
  - mode: dirichlet
    alpha: 0.10
    n_clients: 7
  - mode: dirichlet
    alpha: 0.50
    n_clients: 7
  - mode: dirichlet
    alpha: 1.00
    n_clients: 7
  - mode: dirichlet
    alpha: 5.00
    n_clients: 7

seeds: [42, 0, 1, 2, 3, 4, 5, 6, 7, 8]

shared:
  num_rounds: 100
  clients_per_round: 5
  max_steps_per_round: 50
  batch_size: 64
  lr_warmup_rounds: 3
  seq_len: 5
  sample_ratio: 1.0              # matches existing 60 LSTM cells
  threshold: 0.10
  pos_weight_split: train
  cudnn_deterministic: true
  mixed_precision: bf16          # V100 emulated; 4060 native
  device: cuda

arch_overrides:
  lstm:
    lr: 5.0e-4
  mamba:
    lr: 5.0e-4
  spiking_expand2:
    lr: 5.0e-4                   # ADR D-20 audit-corrected (was 1e-4 outdated)
