# Path D extended sweep — 5 archs × 3 algos × 6 partitions × 10 seeds = 900 cells.
#
# 2026-05-18 extension: original Path D (540 cells, 3 archs) is augmented
# with xLSTM (Beck et al., NeurIPS 2024, arXiv:2405.04517) and Mamba-3
# (Lahoti et al., arXiv:2603.15569, Mar 2026). See
# ``docs/PAPER_NOTES_XLSTM.md`` and ``docs/PAPER_NOTES_MAMBA3.md`` for
# the per-arch design rationale; both new archs satisfy ADR-001 D-20
# param-count parity (xlstm=43241, mamba3=40635, ±10% of LSTM 44553
# on the V3 schema — pin-tested in tests/test_v7_fl_arch_agnostic.py).
#
# Closes the §2.6 "FedSCAM + FedMoSWA deferred → done" framing AND
# extends the empirical arch breadth from 3 (LSTM, Mamba, Spiking) to
# 5 (+ xLSTM, Mamba-3) to address the "recent SOTA" reviewer dimension.
#
# Cell breakdown:
#   existing (preserved via --skip-completed):
#     60 = 1 arch (lstm) × 2 algos × 6 partitions × 5 seeds {0,1,2,3,42}
#       (pre-PathD LSTM-only SAM-family pilot)
#   Path D core (480 cells, in progress on V100 cluster as of 2026-05-18):
#     30  lstm × {fedscam, fedgmt}    × 6 part × 5 seeds {4,5,6,7,8}
#     60  lstm × fedmoswa             × 6 part × 10 seeds
#     180 mamba × 3 algos             × 6 part × 10 seeds
#     180 spiking_expand2 × 3 algos   × 6 part × 10 seeds
#   Path D extension (360 NEW cells; this spec adds them, --skip-completed
#   guarantees the 60 + 480 above are NOT re-run):
#     180 xlstm × 3 algos             × 6 part × 10 seeds
#     180 mamba3 × 3 algos            × 6 part × 10 seeds
#
# Total: 60 (pre-existing) + 480 (Path D core) + 360 (extension) = 900 cells.
#
# Paired-bootstrap caveat: Phase 5 (the source of FedAvg/FedAdam baselines
# for paired Δ-AUC CI95) ran ONLY the original 3 archs. xLSTM and Mamba-3
# do not have a Phase 5 baseline yet — for the new archs' Δ-AUC against
# FedAvg/FedAdam to be paired, an extended Phase 5 sweep covering xlstm
# and mamba3 is needed (separate spec, not in scope here).
#
# Hyperparameters pinned to paper defaults (do NOT retune per arch):
#   FedSCAM (Rahil 2026 arXiv:2601.00853, §3 + §4.1.3 mid-of-tested):
#     rho_max=0.05, alpha_rho=1.0, gamma=1.0, beta_align=0.8, kappa=1.0
#   FedGMT (Lee 2025 ICML, harrylee999/FL-SAM README example):
#     alpha_ema=0.95, gamma_kl=1.0, tau=3.0, beta=10.0, n_total_clients=7
#   FedMoSWA (Liu 2025 ICML, arXiv:2507.20016 §6.1):
#     rho=0.1, alpha_la=1.5, gamma=0.2, n_total_clients=7
#
# Wall budget on 4×V100-SXM2-32GB (sharded across 4 chains via --shard):
#   LSTM cell:      ~530 s  (eager mode, TORCHDYNAMO_DISABLE=1, bf16 emul.)
#   Mamba cell:     ~1100 s
#   Spiking cell:   ~2700 s
#   xLSTM cell:     ~530 s  (placeholder ≈ LSTM tier from 4060 smoke;
#                            refine after V100 pilot #38)
#   Mamba-3 cell:   ~1155 s (placeholder ~1.05× Mamba from 4060 smoke;
#                            refine after V100 pilot #38)
#   NEW wall: 180·530 + 180·1155 = 303,300 s ≈ 84.3 GPU-hr
#           ÷ 4 GPUs = 21.1 hr wall (≈ 1 day)
#   Combined with Path D core ~52 hr: ~73 hr total if back-to-back.
#
# Sharding: ``--shard N/M`` filter on run_v7_phase_sweep.py (1-based).
# Cell index modulo 4 distributes the 5 archs evenly across chains.
# Skip-completed is read AFTER shard so chain assignment is stable.
#
# Mixed precision: bf16 on both V100 (emulated, ~30% slower than fp16 but
# stable without GradScaler) and 4060 Ti (native sm_89). Switching V100 to
# fp16 would require adding torch.cuda.amp.GradScaler to _local_loop —
# deferred (correctness over speed for paper-grade cells).

description: Path D extended SAM-family sweep (5 archs × 3 algos × 6 part × 10 seeds)
adr_reference: ADR-001 D-20 + D-22 + FUTURE_WORK Direction 5

archs:
  - lstm
  - mamba
  - spiking_expand2
  - xlstm
  - mamba3

algorithms:
  - name: fedscam
    kwargs:
      rho_max: 0.05
      alpha_rho: 1.0
      gamma: 1.0
      beta_align: 0.8
      kappa: 1.0
  - name: fedgmt
    kwargs:
      alpha_ema: 0.95
      gamma_kl: 1.0
      tau: 3.0
      beta: 10.0
      n_total_clients: 7
  - name: fedmoswa
    kwargs:
      rho: 0.1
      alpha_la: 1.5
      gamma: 1.0            # Adam-fix: paper default 0.2 causes c_i/m scale
                            # mismatch under Adam (gradient cancellation).
                            # γ=1.0 aligns m fully with c_i scale.
      option: "i"           # Adam-fix: paper default "ii" uses weight-drift
                            # formula (Adam-normalized scale ~100× too large).
                            # option "i" keeps c_i in raw-gradient scale.
                            # See artifacts/v7_fedmoswa_diag for diagnostic.
      n_total_clients: 7

partitions:
  - mode: iid
    n_clients: 7
  - mode: dirichlet
    alpha: 0.05
    n_clients: 7
  - mode: dirichlet
    alpha: 0.10
    n_clients: 7
  - mode: dirichlet
    alpha: 0.50
    n_clients: 7
  - mode: dirichlet
    alpha: 1.00
    n_clients: 7
  - mode: dirichlet
    alpha: 5.00
    n_clients: 7

seeds: [42, 0, 1, 2, 3, 4, 5, 6, 7, 8]

shared:
  num_rounds: 100
  clients_per_round: 5
  max_steps_per_round: 50
  batch_size: 64
  lr_warmup_rounds: 3
  seq_len: 5
  sample_ratio: 1.0              # matches existing 60 LSTM cells
  threshold: 0.10
  pos_weight_split: train
  cudnn_deterministic: true
  mixed_precision: bf16          # V100 emulated; 4060 native
  device: cuda

arch_overrides:
  lstm:
    lr: 5.0e-4
  mamba:
    lr: 5.0e-4
  spiking_expand2:
    lr: 5.0e-4                   # ADR D-20 audit-corrected (was 1e-4 outdated)
  xlstm:
    lr: 5.0e-4                   # matches ARCH_REGISTRY default; xLSTM has
                                  # stabilizer state so initial-step gradient
                                  # is well-conditioned (no surrogate-grad
                                  # warmup compensation needed unlike spiking)
  mamba3:
    lr: 5.0e-4                   # matches ARCH_REGISTRY default; conservative
                                  # init (lambda_proj.bias=+3, theta_proj=0)
                                  # starts near Mamba-2 Euler, so same lr
