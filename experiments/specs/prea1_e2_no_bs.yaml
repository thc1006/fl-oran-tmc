# PREREG-A1 E2 — arm: NO-BS (treatment)
#
# LSTM x FedAvg x natural-by-BS (mode=iid) x 10 seeds, bs_id DROPPED from the
# model input (drop_categorical=["bs_id"]). Identical to prea1_e2_explicit_bs.yaml
# except for the dropped categorical, so the paired-seed AUC delta isolates the
# contribution of the bs INPUT FEATURE to the natural-partition advantage.
#   AUC(no-bs) ~ AUC(explicit-bs) -> bs input is NOT the driver (partition/channel
#                                    structure is) -> intrinsic-structure branch;
#   AUC(no-bs) drops toward 0.74  -> the cell index drives the advantage.
#
# Run on V100 (sm_70 -> fp16):
#   .venv/bin/python experiments/run_v7_phase_sweep.py \
#     --spec experiments/specs/prea1_e2_no_bs.yaml \
#     --output-dir artifacts/prea1_e2/no_bs --skip-completed
# DISTINCT --output-dir from explicit_bs to avoid cell-name collision
# (both produce v7_lstm_fedavg_iid_n7_s<S>).

description: PREREG-A1 E2 no-bs — LSTM x FedAvg x natural-by-BS x 10 seeds, bs_id dropped (V100 fp16)

archs:
  - lstm

algorithms:
  - name: fedavg
    kwargs: {}

partitions:
  - mode: iid
    n_clients: 7

seeds: [0, 1, 2, 3, 4, 5, 6, 7, 8, 42]

shared:
  num_rounds: 100
  clients_per_round: 5
  max_steps_per_round: 50
  batch_size: 64
  lr_warmup_rounds: 3
  seq_len: 5
  sample_ratio: 1.0
  threshold: 0.10
  pos_weight_split: train
  cudnn_deterministic: true
  mixed_precision: fp16        # V100 sm_70: BF16 software-emulated -> use fp16
  device: cuda

arch_overrides:
  lstm:
    lr: 5.0e-4
    drop_categorical: ["bs_id"]   # E2 treatment: remove the cell-identity input
