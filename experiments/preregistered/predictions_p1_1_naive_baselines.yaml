# Pre-registered predictions for P1.1 (naive baselines)
#
# These are HYPOTHESES committed BEFORE the experiment runs. Failure ≠
# code bug; failure = empirical reality contradicts our prior belief →
# paper claim must be revised.
#
# Checked by scripts/check_preregistered.py post-experiment. Not in CI
# gate — pytest only enforces methodology, not predictions.

experiment: p1_1_naive_baselines
hypothesis_set:
  - id: H1.1.A
    claim: "Last-BLER persistence baseline test AUC < canonical Phase 5 LSTM+FedAvg+natural-by-BS test AUC by at least 0.02"
    rationale: |
      ul_bler is in input features (A0.1) and target is 1[ul_bler[t+1] > 0.10],
      so the persistence baseline `predict_t+1 = 1[ul_bler[t] > 0.10]` will
      catch the autoregressive signal. We expect FL methods to add ≥0.02 AUC
      on top of this trivial baseline; if not, the FL machinery is questionable.
    measurement: "artifacts/baselines/naive_results.json :: last_bler_test_auc"
    reference: 0.9159  # Phase 5 LSTM+FedAvg+natural-by-BS test AUC (paper §6.2)
    fail_state_threshold: 0.02
    fail_state_name: FAIL_STATE_1
    on_fail: trigger P1-GATE; paper FL motivation needs revision

  - id: H1.1.B
    claim: "Logistic regression baseline test AUC < canonical Phase 5 LSTM+FedAvg+natural-by-BS test AUC by at least 0.03"
    rationale: |
      LR over the 17 V3_CONTINUOUS features can learn linear combinations
      including ul_bler thresholding. Should beat last-BLER persistence
      slightly but not match LSTM (which captures sequential structure).
    measurement: "artifacts/baselines/naive_results.json :: logreg_test_auc"
    reference: 0.9159
    fail_state_threshold: 0.03
    fail_state_name: FAIL_STATE_1_LR
    on_fail: trigger P1-GATE; FL benefit over LR is too small to justify

  - id: H1.1.C
    claim: "Last-BLER persistence baseline test AUC > 0.55 (above chance)"
    rationale: |
      Sanity check: if persistence AUC is at chance, the 10% threshold may
      be poorly chosen or the test split has near-zero autoregressive signal,
      making the binary forecasting task trivial in the wrong direction.
    measurement: "artifacts/baselines/naive_results.json :: last_bler_test_auc"
    fail_state_threshold: 0.55
    fail_state_name: SANITY_FAIL
    on_fail: investigate dataset / split / threshold before proceeding

# Audit trail
preregistered_by: thc1006
preregistered_at: 2026-05-06
related_audit:
